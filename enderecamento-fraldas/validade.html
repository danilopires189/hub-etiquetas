<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pague Menos • Relatório de Validades</title>
    <link rel="icon" href="../assets/pm.png" />
    <link rel="stylesheet" href="../shared/design-system.css">
    <link rel="stylesheet" href="../shared/components.css">
    <link rel="stylesheet" href="./validade.css">
</head>
<body class="fade-in">
    <div class="screen-container">
        <header class="app-header">
            <div class="header-top-row">
                <div class="brand">
                    <div class="brand-logos">
                        <img src="../assets/pm.png" alt="Pague Menos" class="brand-logo primary">
                        <img src="../assets/logo.png" alt="Danilo" class="brand-logo secondary">
                    </div>
                    <div class="brand-text">
                        <h1>Pague Menos</h1>
                        <span class="app-subtitle">Relatório de Validades</span>
                    </div>
                </div>
            </div>
            <div class="nav-container">
                <div class="nav-content">
                    <button class="btn btn-ghost" onclick="window.location.href='./index.html'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        Voltar
                    </button>
                </div>
            </div>
        </header>

        <section class="panel controls">
            <h2 class="panel-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                Consulta de Validades
            </h2>

            <div class="field">
                <label>Buscar Produto</label>
                <div class="search-row">
                    <input type="text" id="codigoProduto" placeholder="Digite CODDV, código de barras ou endereço" maxlength="50">
                    <button type="button" id="btnClearInput" class="icon-btn" title="Limpar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18"/>
                            <path d="M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <span class="hint">CODDV, código de barras ou endereço completo</span>
            </div>

            <div class="field full">
                <div class="row">
                    <button type="button" class="btn btn-ghost" onclick="diagnosticarConexao()" style="font-size: 0.8rem;">
                        🔧 Testar Conexão
                    </button>
                </div>
            </div>

            <div class="field full">
                <div class="row">
                    <button type="button" id="btnBuscar" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        Buscar
                    </button>
                    <button type="button" id="btnLimpar" class="btn btn-ghost">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18l-2 13H5L3 6z"/>
                            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        Limpar
                    </button>
                </div>
            </div>

            <div class="field full csv-section">
                <label>Relatório por Período (MMAA)</label>
                <div class="row periodo-row">
                    <input type="text" id="validadeInicio" placeholder="Início" maxlength="4">
                    <input type="text" id="validadeFim" placeholder="Fim" maxlength="4">
                    <button type="button" id="btnGerarCSV" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14,2 14,8 20,8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10,9 9,9 8,9"/>
                        </svg>
                        CSV
                    </button>
                </div>
            </div>

            <div class="field full">
                <div id="produtoInfo" class="produto-info hide">
                    <div class="produto-card">
                        <div class="produto-header">
                            <span class="produto-coddv"></span>
                            <span class="produto-status"></span>
                        </div>
                        <div class="produto-desc"></div>
                        <div class="produto-barras"></div>
                        <div class="produto-validade"></div>
                        <div class="produto-endereco"></div>
                        <button type="button" id="btnImprimir" class="btn btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 6 2 18 2 18 9"/>
                                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                                <rect x="6" y="14" width="12" height="8"/>
                            </svg>
                            Imprimir Etiqueta A4
                        </button>
                    </div>
                </div>
            </div>

            <div class="field full hide" id="listaEnderecosContainer">
                <label>Selecione o Endereço</label>
                <div class="enderecos-lista" id="listaEnderecos"></div>
            </div>
        </section>
    </div>

    <!-- Print Template -->
    <div id="printTemplate" class="print-template hide">
        <div class="etiqueta-a4">
            <div class="etiqueta-header">
                <img src="../assets/pm.png" class="etiqueta-logo" alt="Pague Menos">
                <div class="etiqueta-id-badge" id="printIdBadge">ID: --</div>
            </div>
            <div class="etiqueta-content">
                <div class="etiqueta-field">
                    <span class="etiqueta-label">Produto:</span>
                    <span class="etiqueta-value" id="printDesc">--</span>
                </div>
                <div class="etiqueta-row">
                    <div class="etiqueta-field">
                        <span class="etiqueta-label">CODDV:</span>
                        <span class="etiqueta-value" id="printCoddv">--</span>
                    </div>
                    <div class="etiqueta-field">
                        <span class="etiqueta-label">Barras:</span>
                        <span class="etiqueta-value" id="printBarras">--</span>
                    </div>
                </div>
                <div class="etiqueta-field">
                    <span class="etiqueta-label">Validade:</span>
                    <span class="etiqueta-value etiqueta-validade" id="printValidade">--</span>
                </div>
                <div class="etiqueta-field">
                    <span class="etiqueta-label">Endereço:</span>
                    <span class="etiqueta-value" id="printEndereco">--</span>
                </div>
            </div>
            <div class="etiqueta-footer">
                <div class="etiqueta-usuario">
                    <span id="printUsuario">--</span>
                    <span id="printMatricula">--</span>
                </div>
                <div class="etiqueta-data" id="printData">--</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.js"></script>
    <script src="../data_base/BASE_BARRAS.js"></script>
    <script type="module" src="../supabase/init.js"></script>
    <script type="module" src="./enderecamento-supabase.js"></script>
    <script src="./correcao-historico.js"></script>
    <script src="./validade.js"></script>
</body>
</html>

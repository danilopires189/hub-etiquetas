<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Coletor Zebra/Honeywell</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            background: #1a1a2e;
            color: #fff;
        }
        h1 {
            color: #00d9ff;
            font-size: 1.5rem;
        }
        .device-info {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #00d9ff;
        }
        .device-info.zebra {
            border-left-color: #e94560;
        }
        .device-info.honeywell {
            border-left-color: #0f3460;
        }
        .test-input {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            border: 3px solid #0f3460;
            border-radius: 8px;
            margin: 15px 0;
            background: #16213e;
            color: #fff;
        }
        .test-input.scanner {
            border-color: #00d9ff;
            background: #0f3460;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
        }
        .test-input.manual {
            border-color: #e94560;
            background: #533483;
        }
        .log {
            background: #0f0f23;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #333;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
        .log-entry.scanner {
            color: #00d9ff;
        }
        .log-entry.manual {
            color: #e94560;
        }
        .btn {
            padding: 15px 25px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-scan {
            background: #00d9ff;
            color: #1a1a2e;
        }
        .btn-manual {
            background: #e94560;
            color: #fff;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
        }
        .status.scanner {
            background: #00d9ff;
            color: #1a1a2e;
        }
        .status.manual {
            background: #e94560;
            color: #fff;
        }
        .status.waiting {
            background: #533483;
            color: #fff;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .metric {
            background: #16213e;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <h1>📱 Teste - Coletor Zebra/Honeywell</h1>
    
    <div id="deviceInfo" class="device-info">
        <strong>🔍 Detectando dispositivo...</strong>
    </div>
    
    <div class="metrics">
        <div class="metric">
            <div>Threshold Scanner</div>
            <div id="thresholdValue" class="metric-value">--</div>
        </div>
        <div class="metric">
            <div>Velocidade Média</div>
            <div id="speedValue" class="metric-value">--</div>
        </div>
    </div>
    
    <div id="status" class="status waiting">Aguardando entrada...</div>
    
    <h3>📝 Campo de Teste:</h3>
    <input type="text" id="testInput" class="test-input" placeholder="Bipe ou digite o código">
    
    <div>
        <button class="btn btn-scan" onclick="simularScanner()">📱 Simular Scanner (20ms)</button>
        <button class="btn btn-manual" onclick="simularManual()">⌨️ Simular Manual (300ms)</button>
        <button class="btn" onclick="limparLog()" style="background:#533483;color:#fff;">🗑️ Limpar</button>
    </div>
    
    <h3>📊 Log de Eventos:</h3>
    <div id="log" class="log"></div>

    <script>
        const input = document.getElementById('testInput');
        const status = document.getElementById('status');
        const log = document.getElementById('log');
        const deviceInfo = document.getElementById('deviceInfo');
        const thresholdValue = document.getElementById('thresholdValue');
        const speedValue = document.getElementById('speedValue');
        
        // Detectar dispositivo
        const userAgent = navigator.userAgent.toLowerCase();
        const isZebra = /zebra|tc2x|tc5x|tc7x|ec30/i.test(userAgent);
        const isHoneywell = /honeywell|dolphin|eda5x|eda7x/i.test(userAgent);
        const isColetor = isZebra || isHoneywell;
        
        const SCANNER_THRESHOLD = isColetor ? 30 : 50;
        const SCANNER_TIMER = isColetor ? 100 : 150;
        
        // Mostrar info do dispositivo
        if (isZebra) {
            deviceInfo.className = 'device-info zebra';
            deviceInfo.innerHTML = `
                <strong>🦓 Coletor ZEBRA Detectado!</strong><br>
                User Agent: ${navigator.userAgent.substring(0, 60)}...<br>
                Threshold: ${SCANNER_THRESHOLD}ms | Timer: ${SCANNER_TIMER}ms
            `;
        } else if (isHoneywell) {
            deviceInfo.className = 'device-info honeywell';
            deviceInfo.innerHTML = `
                <strong>🐬 Coletor HONEYWELL Detectado!</strong><br>
                User Agent: ${navigator.userAgent.substring(0, 60)}...<br>
                Threshold: ${SCANNER_THRESHOLD}ms | Timer: ${SCANNER_TIMER}ms
            `;
        } else {
            deviceInfo.innerHTML = `
                <strong>📱 Dispositivo Padrão</strong><br>
                User Agent: ${navigator.userAgent.substring(0, 60)}...<br>
                Threshold: ${SCANNER_THRESHOLD}ms | Timer: ${SCANNER_TIMER}ms
            `;
        }
        
        thresholdValue.textContent = SCANNER_THRESHOLD + 'ms';
        
        let barcodeTimer = null;
        let lastInputTime = 0;
        let isManualEntry = false;
        let charCount = 0;
        let firstCharTime = 0;
        
        function addLog(message, type = '') {
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = new Date().toLocaleTimeString('pt-BR', {hour12: false}) + ' - ' + message;
            log.insertBefore(entry, log.firstChild);
            
            // Limitar a 50 entradas
            while (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }
        
        function limparLog() {
            log.innerHTML = '';
            input.value = '';
            status.textContent = 'Aguardando entrada...';
            status.className = 'status waiting';
            input.className = 'test-input';
            speedValue.textContent = '--';
            addLog('🗑️ Log limpo');
        }
        
        // Configurar detecção de scanner
        input.addEventListener('input', function(e) {
            const value = e.target.value;
            const currentTime = Date.now();
            const timeSinceLastInput = currentTime - lastInputTime;
            
            // Limpar timer existente
            if (barcodeTimer) {
                clearTimeout(barcodeTimer);
                barcodeTimer = null;
            }
            
            if (value.length > 0) {
                // Primeiro caractere
                if (value.length === 1) {
                    isManualEntry = false;
                    firstCharTime = currentTime;
                    charCount = 1;
                    lastInputTime = currentTime;
                    status.textContent = 'Iniciando entrada...';
                    status.className = 'status waiting';
                    input.className = 'test-input';
                    addLog('📝 Primeiro caractere');
                    return;
                }
                
                // Incrementar contador
                charCount++;
                
                // Detectar método de entrada
                if (timeSinceLastInput > SCANNER_THRESHOLD) {
                    // Entrada manual
                    isManualEntry = true;
                    status.textContent = '🖊️ MANUAL detectado!';
                    status.className = 'status manual';
                    input.className = 'test-input manual';
                    addLog(`🖊️ MANUAL: ${timeSinceLastInput}ms > ${SCANNER_THRESHOLD}ms`, 'manual');
                } else {
                    // Entrada rápida - scanner
                    status.textContent = '📱 SCANNER detectado!';
                    status.className = 'status scanner';
                    input.className = 'test-input scanner';
                    addLog(`📱 SCANNER: ${timeSinceLastInput}ms <= ${SCANNER_THRESHOLD}ms`, 'scanner');
                    
                    // Calcular velocidade média
                    if (charCount >= 3) {
                        const tempoTotal = currentTime - firstCharTime;
                        const velocidadeMedia = tempoTotal / charCount;
                        speedValue.textContent = velocidadeMedia.toFixed(1) + 'ms';
                        addLog(`📊 Velocidade média: ${velocidadeMedia.toFixed(2)}ms/caractere`);
                    }
                    
                    // Timer para busca automática
                    barcodeTimer = setTimeout(() => {
                        addLog('✅ BUSCA AUTOMÁTICA EXECUTADA!', 'scanner');
                        status.textContent = '✅ Busca automática!';
                        alert('✅ Busca automática!\nCódigo: ' + input.value);
                    }, SCANNER_TIMER);
                }
            } else {
                // Campo vazio
                isManualEntry = false;
                charCount = 0;
                status.textContent = 'Aguardando entrada...';
                status.className = 'status waiting';
                input.className = 'test-input';
                speedValue.textContent = '--';
            }
            
            lastInputTime = currentTime;
        });
        
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (barcodeTimer) {
                    clearTimeout(barcodeTimer);
                    barcodeTimer = null;
                }
                addLog('⏎ ENTER pressionado - buscando...');
                alert('Busca manual!\nCódigo: ' + input.value);
            }
        });
        
        // Simular scanner (coletor industrial - muito rápido)
        function simularScanner() {
            limparLog();
            addLog('🧪 Simulando SCANNER de coletor (20ms entre caracteres)...');
            input.value = '';
            input.focus();
            
            const codigo = 'PF01.001.001.A01';
            let i = 0;
            
            const intervalo = setInterval(() => {
                if (i < codigo.length) {
                    input.value += codigo[i];
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                    i++;
                } else {
                    clearInterval(intervalo);
                    addLog('✅ Simulação de scanner concluída');
                }
            }, 20); // 20ms entre caracteres (muito rápido)
        }
        
        // Simular entrada manual (lenta)
        function simularManual() {
            limparLog();
            addLog('🧪 Simulando DIGITAÇÃO MANUAL (300ms entre caracteres)...');
            input.value = '';
            input.focus();
            
            const codigo = 'PF02.002.002.A02';
            let i = 0;
            
            const intervalo = setInterval(() => {
                if (i < codigo.length) {
                    input.value += codigo[i];
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                    i++;
                } else {
                    clearInterval(intervalo);
                    addLog('✅ Simulação manual concluída');
                    addLog('📝 Pressione ENTER para buscar');
                }
            }, 300); // 300ms entre caracteres (lento)
        }
        
        addLog('🚀 Página de teste carregada');
        addLog(`🔍 Dispositivo: ${isZebra ? 'Zebra' : isHoneywell ? 'Honeywell' : 'Padrão'}`);
        addLog(`⚙️ Threshold: ${SCANNER_THRESHOLD}ms | Timer: ${SCANNER_TIMER}ms`);
    </script>
</body>
</html>
